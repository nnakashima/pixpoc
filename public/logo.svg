<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA07A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Text -->
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="url(#textGradient)" text-anchor="middle" filter="url(#glow)">
    PixPoc
  </text>
  
  <!-- Balloon accent -->
  <ellipse cx="170" cy="25" rx="12" ry="15" fill="#FF6B6B" opacity="0.8"/>
  <path d="M 170 40 Q 168 45 170 50" stroke="#FF6B6B" stroke-width="1.5" fill="none"/>
  <circle cx="170" cy="22" r="4" fill="#FFE5E5" opacity="0.6"/>
</svg>
